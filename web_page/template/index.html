<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google App Engine Sample</title>
    <style>
        /* This section styles the entire page */
        body {
            /* Replace the placeholder URL with the link to your actual background image */
            background-image: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?auto=format&fit=crop&q=80&w=1920'); 
            background-size: cover; /* Ensures the image covers the entire screen */
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; /* Makes the body take up the full viewport height */
            margin: 0;
            
            /* Flexbox is used to perfectly center the text vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* This section styles the text container */
        .text-container {
            color: #FFD700; /* Sets the text color (Gold in this case). You can change the hex code. */
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8); /* Adds a shadow to make it readable over the image */
            
            /* Optional: Adds a subtle dark box behind the text for better contrast */
            background-color: rgba(0, 0, 0, 0.5); 
            padding: 30px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="text-container">
        this the html code for the google app engine
    </div>

</body>
</html>
